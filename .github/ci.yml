name: IsyShell CI
 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
 
jobs:
  test:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
 
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Instalar dependências
        run: pip install -r requirements.txt httpx
 
      - name: Inicializar banco de dados
        run: python -c "from core.database import init_db; init_db()"
 
      - name: Rodar testes
        run: |
          python -c "
          from fastapi.testclient import TestClient
          from main import app
 
          client = TestClient(app)
          TOKEN = '544c5787-613a-4ac2-8e61-9e6486f8d74a'
          HEADERS = {'X-Isy-Token': TOKEN}
 
          # Health check
          r = client.get('/')
          assert r.status_code == 200, 'Health check falhou'
 
          # Sem token deve retornar 422
          r = client.get('/api/v1/scripts/')
          assert r.status_code == 422, 'Rota sem token deveria retornar 422'
 
          # Token errado deve retornar 401
          r = client.get('/api/v1/scripts/', headers={'X-Isy-Token': 'errado'})
          assert r.status_code == 401, 'Token errado deveria retornar 401'
 
          # Listar scripts
          r = client.get('/api/v1/scripts/', headers=HEADERS)
          assert r.status_code == 200, 'Listagem de scripts falhou'
 
          # Executar script
          r = client.post('/api/v1/scripts/run', json={'script_name': 'provision_client', 'parameters': ['cli_ci', 'CI Test']}, headers=HEADERS)
          assert r.status_code == 200, 'Execucao de script falhou'
 
          # Bloqueio de command injection
          r = client.post('/api/v1/scripts/run', json={'script_name': 'provision_client', 'parameters': ['cli; rm -rf /', 'Hack']}, headers=HEADERS)
          assert r.status_code == 400, 'Command injection nao foi bloqueado'
 
          # Logs
          r = client.get('/api/v1/logs/', headers=HEADERS)
          assert r.status_code == 200, 'Logs falhou'
 
          print('Todos os testes passaram!')
          "
 
      - name: Build da imagem Docker
        run: docker build -t isyshell-api .