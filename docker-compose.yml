version: "3.9"

services:
  isyshell:
    build: .
    container_name: isyshell-api
    ports:
      - "8000:8000"
    volumes:
      # Mapeia os scripts do host para dentro do container
      - ./scripts:/opt/isyone/scripts
      # Persiste o banco SQLite fora do container
      - ./data:/app/data
    environment:
      - SCRIPTS_DIR=/opt/isyone/scripts
      - DATABASE_URL=sqlite:///./data/isyone.db
    restart: unless-stopped
